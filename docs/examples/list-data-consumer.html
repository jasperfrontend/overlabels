<!doctype html>
<!--
  Overlabels List data consumer - reference example
  ===================================================

  This page is NOT an Overlabels overlay. Overlay templates strip all
  JavaScript, so they cannot fetch or parse list data themselves. Instead you
  host a page like this one anywhere (GitHub Pages, tiiny.host, your own host),
  and add ITS url as a separate Browser Source in OBS.

  It reads a List as JSON from the public read endpoint:

      GET https://overlabels.com/api/lists/{slug}?token={overlay token}

  - {slug}  is your List's slug.
  - {token} is an Overlay Access Token from your Overlabels dashboard. Treat it
            like sharing your overlay URL: anyone with it can read this list.

  Pass them in the page url so you can reuse the same file for any list:

      list-data-consumer.html?base=https://overlabels.com&slug=wheel&token=abc...

  The endpoint returns the full item objects:
      { id, value, added_at, label, weight, color }
  Today label is always null, weight always 1, color always null - those are
  reserved for when per-item editing ships. Build against id / value / added_at.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Overlabels List consumer</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: transparent; }
    #wheel { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px; }
    .slice {
      padding: 8px 14px; border-radius: 8px; font-size: 18px; color: #fff;
      background: #6d28d9; /* falls back to a default when item.color is null */
    }
    #err { color: #f87171; padding: 16px; font-family: monospace; }
  </style>
</head>
<body>
  <div id="wheel"></div>
  <div id="err"></div>

  <script>
    // --- config: from the page url, with sensible fallbacks ---------------
    const params = new URLSearchParams(location.search);
    const BASE = params.get('base') || 'https://overlabels.com';
    const SLUG = params.get('slug') || 'wheel';
    const TOKEN = params.get('token') || '';
    const POLL_MS = Number(params.get('poll') || 0); // 0 = fetch once

    const wheelEl = document.getElementById('wheel');
    const errEl = document.getElementById('err');

    async function load() {
      try {
        const url = `${BASE}/api/lists/${encodeURIComponent(SLUG)}?token=${encodeURIComponent(TOKEN)}`;
        const res = await fetch(url);
        if (!res.ok) {
          errEl.textContent = `Could not load list '${SLUG}': HTTP ${res.status}. Check the slug and token.`;
          return;
        }
        errEl.textContent = '';
        const data = await res.json();
        render(data.items || []);
      } catch (e) {
        errEl.textContent = `Fetch failed: ${e}. If this is a browser source, the page must be served over https.`;
      }
    }

    function render(items) {
      // Key each slice by item.id - stable, unique, never reused. Two items
      // with the same value (two viewers both named "guest") stay distinct,
      // and an item that survives a draw keeps its slice.
      wheelEl.replaceChildren(...items.map((it) => {
        const slice = document.createElement('div');
        slice.className = 'slice';
        slice.dataset.id = it.id;
        if (it.color) slice.style.background = it.color; // reserved; null today
        slice.textContent = it.label || it.value;        // label reserved; null today
        return slice;
      }));
    }

    load();
    if (POLL_MS > 0) setInterval(load, POLL_MS);
  </script>
</body>
</html>
