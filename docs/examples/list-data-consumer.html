<!doctype html>
<!--
  Overlabels List data consumer - reference example
  ===================================================

  This page is NOT an Overlabels overlay. Overlay templates strip all
  JavaScript, so they cannot fetch or parse list data themselves. Instead you
  host a page like this one anywhere (GitHub Pages, tiiny.host, your own host),
  and add ITS url as a separate Browser Source in OBS.

  It does two things:
    1. BOOTSTRAP - fetch the List once as JSON:
         GET https://overlabels.com/api/lists/{slug}?token={overlay token}
    2. SUBSCRIBE - using the `realtime` block the endpoint returns, connect to
       the per-list WebSocket channel and re-render whenever the List changes
       (a chat append, a draw, an edit) - no polling.

  Pass slug + token in the page url so you can reuse the same file:

      list-data-consumer.html?base=https://overlabels.com&slug=wheel&token=abc...

  Items are full objects: { id, value, added_at, label, weight, color }.
  Today label is null, weight is 1, color is null - reserved for when per-item
  editing ships. Build against id / value / added_at; key DOM by `id` so two
  identical values never collide and a survivor keeps its element.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Overlabels List consumer</title>
  <script src="https://cdn.jsdelivr.net/npm/pusher-js@8.4.0/dist/web/pusher.min.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: transparent; }
    #wheel { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px; }
    .slice { padding: 8px 14px; border-radius: 8px; font-size: 18px; color: #fff; background: #6d28d9; }
    #status { padding: 8px 16px; font: 12px monospace; color: #9ca3af; }
    #err { color: #f87171; padding: 16px; font-family: monospace; }
  </style>
</head>
<body>
  <div id="status">starting...</div>
  <div id="wheel"></div>
  <div id="err"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const BASE = params.get('base') || 'https://overlabels.com';
    const SLUG = params.get('slug') || 'wheel';
    const TOKEN = params.get('token') || '';

    const wheelEl = document.getElementById('wheel');
    const statusEl = document.getElementById('status');
    const errEl = document.getElementById('err');

    function render(items) {
      // Key each slice by item.id - stable, unique, never reused.
      wheelEl.replaceChildren(...items.map((it) => {
        const slice = document.createElement('div');
        slice.className = 'slice';
        slice.dataset.id = it.id;
        if (it.color) slice.style.background = it.color; // reserved; null today
        slice.textContent = it.label || it.value;        // label reserved; null today
        return slice;
      }));
    }

    async function start() {
      // 1. BOOTSTRAP: fetch current state + how to subscribe.
      let data;
      try {
        const url = `${BASE}/api/lists/${encodeURIComponent(SLUG)}?token=${encodeURIComponent(TOKEN)}`;
        const res = await fetch(url);
        if (!res.ok) { errEl.textContent = `Could not load '${SLUG}': HTTP ${res.status}.`; return; }
        data = await res.json();
      } catch (e) { errEl.textContent = `Fetch failed: ${e}`; return; }

      render(data.items || []);
      statusEl.textContent = `loaded ${data.count} items`;

      // 2. SUBSCRIBE: live updates over the per-list channel.
      const rt = data.realtime;
      if (!rt || !rt.key) { statusEl.textContent += ' (no realtime config; static only)'; return; }

      const pusher = new Pusher(rt.key, {
        wsHost: rt.host,
        wsPort: rt.port,
        wssPort: rt.port,
        forceTLS: rt.scheme === 'https',
        enabledTransports: ['ws', 'wss'],
        cluster: 'mt1', // unused by self-hosted Reverb, but pusher-js wants a value
        authorizer: (channel) => ({
          authorize: (socketId, cb) => {
            fetch(rt.auth_endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ socket_id: socketId, channel_name: channel.name, token: TOKEN, slug: SLUG }),
            }).then((r) => r.json()).then((d) => cb(null, d)).catch((e) => cb(e, null));
          },
        }),
      });

      const channel = pusher.subscribe('private-' + rt.channel);
      channel.bind('pusher:subscription_succeeded', () => { statusEl.textContent += ' - live'; });
      channel.bind(rt.event, (payload) => { render(payload.items || []); });
    }

    start();
  </script>
</body>
</html>
