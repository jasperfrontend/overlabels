# Kamal 2 deploy config for Overlabels (Laravel 12 + Reverb + Postgres + Redis)
#
# Single Linode Shared 4 GB VM in Frankfurt (eu-central). One Docker image
# (built from the repo root Dockerfile) drives four roles: web, queue,
# scheduler, reverb. Postgres/Redis run as accessories on the same host.
# StreamLabs and StreamElements listeners are accessories built from
# Dockerfile.streamlabs-listener / Dockerfile.streamelements-listener and
# pushed to GHCR by the deploy workflow.
#
# Replace 172.235.171.209 with the Linode public IP once the VM is provisioned.

service: overlabels
image: jasperfrontend/overlabels

servers:
  web:
    hosts:
      - 172.235.171.209
    proxy:
      ssl: true
      host: overlabels.com
      app_port: 80
      healthcheck:
        interval: 5
        path: /up
        timeout: 5
    env:
      clear:
        ROLE: web
        ENTRYPOINT_RUN_MIGRATIONS: "1"
        ENTRYPOINT_RUN_HELP_INDEX: "1"
        ENTRYPOINT_RUN_OG_GENERATE: "1"
        SERVER_NAME: ":80"

  queue:
    hosts:
      - 172.235.171.209
    cmd: php artisan queue:work --verbose --tries=3 --timeout=300 --sleep=3 --max-jobs=1000 --max-time=3600
    env:
      clear:
        ROLE: queue
        ENTRYPOINT_SKIP_CACHE: "0"

  scheduler:
    hosts:
      - 172.235.171.209
    cmd: bash -c 'while true; do php artisan schedule:run --no-interaction --verbose; sleep 60; done'
    env:
      clear:
        ROLE: scheduler
        ENTRYPOINT_SKIP_CACHE: "0"

  reverb:
    hosts:
      - 172.235.171.209
    cmd: php artisan reverb:start --host=0.0.0.0 --port=8080
    proxy:
      ssl: true
      host: ws.overlabels.com
      app_port: 8080
      healthcheck:
        interval: 10
        path: /up
        timeout: 5
      # Long drain so in-flight WebSocket frames have a chance to flush during deploy
      buffering:
        requests: false
        responses: false
    env:
      clear:
        ROLE: reverb
        ENTRYPOINT_SKIP_CACHE: "1"

# Pull base + push deploys via GitHub Container Registry
registry:
  server: ghcr.io
  username: jasperfrontend
  password:
    - KAMAL_REGISTRY_PASSWORD

# SSH user provisioned on the VM (NOT root)
ssh:
  user: deploy

builder:
  arch: amd64
  # Build locally on a beefy dev box; remote build on a 4 GB VM is painfully slow
  remote: false
  # Registry-based cache works with Kamal's own buildx builder
  # (`kamal-local-docker-container`) because it's already authenticated against
  # GHCR for the main image push. `type: gha` silently fails here - Kamal's
  # builder isn't the same buildx builder that docker/setup-buildx-action
  # creates, so it can't reach the GHA cache service even when the flag is set.
  cache:
    type: registry
    # Kamal auto-prepends registry.server (ghcr.io) to this value, same as it
    # does for the main image field. Writing the full `ghcr.io/...` path here
    # produces `ghcr.io/ghcr.io/...` and silently breaks cache hits.
    image: jasperfrontend/overlabels-buildcache
    options: mode=max
  # Vite needs these at npm-build time. They get inlined into the JS bundle
  # and shipped to clients - that's by design (the Reverb app key is the
  # client-facing identifier; channel auth uses server-issued tokens).
  args:
    VITE_APP_NAME: Overlabels
    VITE_REVERB_APP_KEY: wecfzfxnwrfjyu1taehi
    VITE_REVERB_HOST: ws.overlabels.com
    VITE_REVERB_PORT: "443"
    VITE_REVERB_SCHEME: https
    APP_COMMIT_SHA: <%= ENV['APP_COMMIT_SHA'] || 'dev' %>

# Shared environment (everything not in `secrets` is plaintext on the host)
env:
  clear:
    APP_ENV: production
    APP_DEBUG: "false"
    APP_URL: https://overlabels.com
    APP_NAME: Overlabels
    APP_FORCE_HTTPS: "true"
    LOG_CHANNEL: stderr
    LOG_LEVEL: info

    # OAuth redirect URIs - hard-coded for clarity (services.php has APP_URL fallbacks)
    TWITCH_REDIRECT_URI: https://overlabels.com/auth/callback/twitch
    TWITCHBOT_REDIRECT_URI: https://overlabels.com/auth/twitchbot/callback

    DB_CONNECTION: pgsql
    DB_HOST: overlabels-postgres
    DB_PORT: "5432"
    DB_DATABASE: overlabels
    DB_USERNAME: overlabels

    SESSION_DRIVER: database
    SESSION_DOMAIN: .overlabels.com
    SESSION_SECURE_COOKIE: "true"

    QUEUE_CONNECTION: database
    CACHE_STORE: redis
    BROADCAST_CONNECTION: reverb
    FILESYSTEM_DISK: local

    REDIS_HOST: overlabels-redis
    REDIS_PORT: "6379"

    REVERB_HOST: ws.overlabels.com
    REVERB_PORT: "443"
    REVERB_SCHEME: https
    REVERB_SERVER_HOST: 0.0.0.0
    REVERB_SERVER_PORT: "8080"
    REVERB_SCALING_ENABLED: "false"

    VITE_REVERB_HOST: ws.overlabels.com
    VITE_REVERB_PORT: "443"
    VITE_REVERB_SCHEME: https

    TELESCOPE_ENABLED: "false"
    TRUSTED_PROXIES: "*"

  secret:
    - APP_KEY
    - DB_PASSWORD

    - REVERB_APP_ID
    - REVERB_APP_KEY
    - REVERB_APP_SECRET
    - VITE_REVERB_APP_KEY

    - TWITCH_CLIENT_ID
    - TWITCH_CLIENT_SECRET
    - TWITCH_WEBHOOK_SECRET

    - TWITCHBOT_CLIENT_ID
    - TWITCHBOT_CLIENT_SECRET
    - TWITCHBOT_LISTENER_SECRET

    - STREAMLABS_CLIENT_ID
    - STREAMLABS_CLIENT_SECRET
    - STREAMLABS_LISTENER_SECRET

    - STREAMELEMENTS_LISTENER_SECRET

    - FW_CLIENT_ID
    - FW_CLIENT_SECRET
    - FW_AUTH_URL
    - FW_REDIRECT_URL
    - FW_HMAC

    - CLOUDINARY_URL

    - INTEGRATION_SUGGESTION_WEBHOOK_URL
    - SIGNUP_NOTIFICATION_EMAIL

    - DEPLOY_WEBHOOK_SECRET

aliases:
  console: app exec --interactive --reuse "php artisan tinker"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  migrate: app exec "php artisan migrate --force"

accessories:
  postgres:
    image: postgres:16-alpine
    host: 172.235.171.209
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: overlabels
        POSTGRES_DB: overlabels
        POSTGRES_INITDB_ARGS: "--data-checksums"
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
    # Conservative tuning for a shared 4 GB box (passed via -c flags so we
    # don't need to mount a postgresql.conf or use include_dir)
    cmd: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    options:
      memory: 768m

  redis:
    image: redis:7-alpine
    host: 172.235.171.209
    port: "127.0.0.1:6379:6379"
    cmd: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --save ""
    directories:
      - redis-data:/data
    options:
      memory: 256m

  streamlabs-listener:
    image: ghcr.io/jasperfrontend/overlabels-streamlabs-listener:latest
    host: 172.235.171.209
    env:
      clear:
        APP_URL: https://overlabels.com
      secret:
        - STREAMLABS_LISTENER_SECRET
    options:
      memory: 128m

  streamelements-listener:
    image: ghcr.io/jasperfrontend/overlabels-streamelements-listener:latest
    host: 172.235.171.209
    env:
      clear:
        APP_URL: https://overlabels.com
      secret:
        - STREAMELEMENTS_LISTENER_SECRET
    options:
      memory: 128m
