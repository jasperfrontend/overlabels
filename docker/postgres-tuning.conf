# Postgres tuning for a shared 4 GB Linode VM where Postgres co-exists with
# FrankenPHP, Reverb, queue worker, scheduler, Redis, and Node listeners.
# Allocates ~768 MB to Postgres, leaves ~3.2 GB for everything else.

shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 8MB
maintenance_work_mem = 64MB

max_connections = 50

# Logging just to stderr - kamal-proxy / docker logs picks it up
log_destination = 'stderr'
logging_collector = off

# Checkpoints tuned for a small busy DB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
random_page_cost = 1.1
effective_io_concurrency = 200
