; PHP upload limits aligned with Laravel-side validation
; (CloudinaryUploadController validates image as max:10240 = 10MB).
; post_max_size sits above upload_max_filesize to leave room for the
; multipart envelope and the `kind` field, so PHP accepts the full
; 10MB file and Laravel's validator then renders any image-specific
; error (size, dimensions, mime) instead of the generic "failed to upload".
upload_max_filesize = 10M
post_max_size = 12M
