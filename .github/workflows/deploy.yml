name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby (for Kamal)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Kamal
        run: gem install kamal --no-document

      # Build & push the listener images first (small, fast). Kamal's app build
      # comes next inside `kamal deploy`.
      - name: Build & push streamlabs-listener
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.streamlabs-listener
          push: true
          tags: |
            ghcr.io/jasperfrontend/overlabels-streamlabs-listener:latest
            ghcr.io/jasperfrontend/overlabels-streamlabs-listener:${{ github.sha }}
          cache-from: type=gha,scope=streamlabs-listener
          cache-to: type=gha,mode=max,scope=streamlabs-listener

      - name: Build & push streamelements-listener
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.streamelements-listener
          push: true
          tags: |
            ghcr.io/jasperfrontend/overlabels-streamelements-listener:latest
            ghcr.io/jasperfrontend/overlabels-streamelements-listener:${{ github.sha }}
          cache-from: type=gha,scope=streamelements-listener
          cache-to: type=gha,mode=max,scope=streamelements-listener

      - name: Build & push expression-engine
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.expression-engine
          push: true
          tags: |
            ghcr.io/jasperfrontend/overlabels-expression-engine:latest
            ghcr.io/jasperfrontend/overlabels-expression-engine:${{ github.sha }}
          cache-from: type=gha,scope=expression-engine
          cache-to: type=gha,mode=max,scope=expression-engine

      # Kamal deploy: builds + pushes the main app image, rolls all roles.
      # The deploy SSH key + registry password are pulled from secrets.
      - name: Kamal deploy
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          SSH_PRIVATE_KEY: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}
          # Laravel + Reverb secrets that Kamal needs to inject into containers
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REVERB_APP_ID: ${{ secrets.REVERB_APP_ID }}
          REVERB_APP_KEY: ${{ secrets.REVERB_APP_KEY }}
          REVERB_APP_SECRET: ${{ secrets.REVERB_APP_SECRET }}
          VITE_REVERB_APP_KEY: ${{ secrets.REVERB_APP_KEY }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_WEBHOOK_SECRET: ${{ secrets.TWITCH_WEBHOOK_SECRET }}
          TWITCHBOT_CLIENT_ID: ${{ secrets.TWITCHBOT_CLIENT_ID }}
          TWITCHBOT_CLIENT_SECRET: ${{ secrets.TWITCHBOT_CLIENT_SECRET }}
          TWITCHBOT_LISTENER_SECRET: ${{ secrets.TWITCHBOT_LISTENER_SECRET }}
          STREAMLABS_CLIENT_ID: ${{ secrets.STREAMLABS_CLIENT_ID }}
          STREAMLABS_CLIENT_SECRET: ${{ secrets.STREAMLABS_CLIENT_SECRET }}
          STREAMLABS_LISTENER_SECRET: ${{ secrets.STREAMLABS_LISTENER_SECRET }}
          STREAMELEMENTS_LISTENER_SECRET: ${{ secrets.STREAMELEMENTS_LISTENER_SECRET }}
          EXPRESSION_ENGINE_SECRET: ${{ secrets.EXPRESSION_ENGINE_SECRET }}
          FW_CLIENT_ID: ${{ secrets.FW_CLIENT_ID }}
          FW_CLIENT_SECRET: ${{ secrets.FW_CLIENT_SECRET }}
          FW_AUTH_URL: ${{ secrets.FW_AUTH_URL }}
          FW_REDIRECT_URL: ${{ secrets.FW_REDIRECT_URL }}
          FW_HMAC: ${{ secrets.FW_HMAC }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          INTEGRATION_SUGGESTION_WEBHOOK_URL: ${{ secrets.INTEGRATION_SUGGESTION_WEBHOOK_URL }}
          SIGNUP_NOTIFICATION_EMAIL: ${{ secrets.SIGNUP_NOTIFICATION_EMAIL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          APP_COMMIT_SHA: ${{ github.sha }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

          # Kamal 2 reads secrets from .kamal/secrets (gitignored locally).
          # Generate it from the step env so Kamal can source it at deploy time.
          mkdir -p .kamal
          {
            for v in KAMAL_REGISTRY_PASSWORD APP_KEY DB_PASSWORD POSTGRES_PASSWORD \
                     REVERB_APP_ID REVERB_APP_KEY REVERB_APP_SECRET VITE_REVERB_APP_KEY \
                     TWITCH_CLIENT_ID TWITCH_CLIENT_SECRET TWITCH_WEBHOOK_SECRET \
                     TWITCHBOT_CLIENT_ID TWITCHBOT_CLIENT_SECRET TWITCHBOT_LISTENER_SECRET \
                     STREAMLABS_CLIENT_ID STREAMLABS_CLIENT_SECRET STREAMLABS_LISTENER_SECRET \
                     STREAMELEMENTS_LISTENER_SECRET \
                     EXPRESSION_ENGINE_SECRET \
                     FW_CLIENT_ID FW_CLIENT_SECRET FW_AUTH_URL FW_REDIRECT_URL FW_HMAC \
                     CLOUDINARY_URL \
                     FREESOUND_API_KEY \
                     INTEGRATION_SUGGESTION_WEBHOOK_URL SIGNUP_NOTIFICATION_EMAIL \
                     DEPLOY_WEBHOOK_SECRET; do
              printf '%s=%q\n' "$v" "${!v}"
            done
          } > .kamal/secrets

          kamal deploy --skip-push=false

          # `kamal deploy` doesn't auto-boot newly-added accessories - they
          # need a one-time `kamal accessory boot`. We run it after every
          # deploy so a fresh accessory in config/deploy.yml comes up on
          # the next push without manual intervention. `|| true` swallows
          # the harmless "already booted" error for accessories that are
          # already running. When you add a new accessory, append another
          # line here.
          kamal accessory boot expression-engine || true

      - name: Notify app of successful deploy
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          curl -fsS -X POST "https://overlabels.com/api/webhooks/deploy/${DEPLOY_WEBHOOK_SECRET}" \
            -H 'Content-Type: application/json' \
            -d "{\"sha\":\"${{ github.sha }}\"}"
