<div class="wheel-stage">
  <div class="wheel-frame">
    <div class="wheel-pointer"></div>
    <div class="wheel-spinner" style="transform: rotate([[[c:wheel_spin:__INSTANCE__:rotation_deg]]]deg)">
      <div class="wheel-disk">
        <div class="wheel-segment wheel-segment-0"><span>Pizza</span></div>
        <div class="wheel-segment wheel-segment-1"><span>Tacos</span></div>
        <div class="wheel-segment wheel-segment-2"><span>Sushi</span></div>
        <div class="wheel-segment wheel-segment-3"><span>Burger</span></div>
        <div class="wheel-segment wheel-segment-4"><span>Salad</span></div>
        <div class="wheel-segment wheel-segment-5"><span>Pasta</span></div>
        <div class="wheel-segment wheel-segment-6"><span>Curry</span></div>
        <div class="wheel-segment wheel-segment-7"><span>BBQ</span></div>
      </div>
      <div class="wheel-hub"></div>
    </div>
  </div>
  <div class="wheel-result-card">
    <div class="wheel-result-label">Last spin</div>
    <div class="wheel-result-text">[[[c:wheel_spin:__INSTANCE__:result]]]</div>
  </div>
</div>
